services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks: [demo-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    command: start-dev --import-realm
    environment:
      KC_HOSTNAME: http://localhost:8888/auth
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./infra/keycloak/pisp-realm.json:/opt/keycloak/data/import/pisp-realm.json:ro
    networks: [demo-net]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Keycloak 26+ image has no curl/wget. Use bash /dev/tcp to send a real
      # HTTP GET to the pisp realm endpoint — confirms realm import is complete,
      # not just that the port is open.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /auth/realms/pisp HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  fee-engine:
    build: ./services/fee-engine
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fee_engine
      DB_USERNAME: fee_engine
      DB_PASSWORD: ${POSTGRES_PASSWORD:-demo}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/pisp/protocol/openid-connect/certs
      OIDC_ISSUER_URI: http://localhost:8888/auth/realms/pisp
    networks: [demo-net]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  db-seeder:
    image: postgres:16
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-demo}
    volumes:
      - ./infra/postgres/seed.sql:/seed.sql:ro
    networks: [demo-net]
    restart: "no"
    depends_on:
      fee-engine:
        condition: service_healthy
    command: >
      psql -h postgres -U fee_engine -d fee_engine -f /seed.sql

  ai-assistant:
    build: ./services/ai-assistant
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fee_ai_assistant
      DB_USERNAME: fee_ai
      DB_PASSWORD: ${POSTGRES_PASSWORD:-demo}
      FEE_ENGINE_BASE_URL: http://fee-engine:8080
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/pisp/protocol/openid-connect/certs
      OIDC_ISSUER_URI: http://localhost:8888/auth/realms/pisp
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.z.ai/api/anthropic}
      AI_MODEL: ${AI_MODEL:-glm-5.1}
      AI_CHAT_ENABLED: "true"
    networks: [demo-net]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      fee-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  admin-ui:
    build: ./services/admin-ui
    networks: [demo-net]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [demo-net]
    restart: unless-stopped
    depends_on:
      fee-engine:
        condition: service_healthy
      ai-assistant:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      admin-ui:
        condition: service_started

volumes:
  pg_data:

networks:
  demo-net:
    name: fee-engine-demo-net
