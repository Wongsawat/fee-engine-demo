services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks: [demo-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26
    command: start-dev --import-realm
    environment:
      KC_HOSTNAME_URL: http://localhost
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./infra/keycloak/pisp-realm.json:/opt/keycloak/data/import/pisp-realm.json:ro
    networks: [demo-net]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # curl ships with Keycloak's UBI9 base image — no extra install needed
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/auth/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  fee-engine:
    build: ./services/fee-engine
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fee_engine
      DB_USERNAME: fee_engine
      DB_PASSWORD: ${POSTGRES_PASSWORD:-demo}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/pisp/protocol/openid-connect/certs
      SPRING_SQL_INIT_DATA_LOCATIONS: file:/app/seed.sql
      SPRING_SQL_INIT_MODE: always
      SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"
    volumes:
      - ./infra/postgres/seed.sql:/app/seed.sql:ro
    networks: [demo-net]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  ai-assistant:
    build: ./services/ai-assistant
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fee_ai_assistant
      DB_USERNAME: fee_ai
      DB_PASSWORD: ${POSTGRES_PASSWORD:-demo}
      FEE_ENGINE_BASE_URL: http://fee-engine:8080
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/pisp/protocol/openid-connect/certs
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.z.ai/api/anthropic}
      AI_MODEL: ${AI_MODEL:-glm-5.1}
      AI_CHAT_ENABLED: "true"
    networks: [demo-net]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      fee-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  admin-ui:
    build: ./services/admin-ui
    networks: [demo-net]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [demo-net]
    restart: unless-stopped
    depends_on:
      fee-engine:
        condition: service_healthy
      ai-assistant:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      admin-ui:
        condition: service_started

volumes:
  pg_data:

networks:
  demo-net:
    name: fee-engine-demo-net
