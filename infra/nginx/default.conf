server {
    listen 80;

    # Use Docker's internal DNS so upstream hostnames are re-resolved after
    # container restarts (avoids stale IP 502s).
    resolver 127.0.0.11 valid=5s;

    # Keycloak — must preserve the /auth/ prefix end-to-end.
    # proxy_pass has NO trailing path: nginx forwards the original URI verbatim,
    # so /auth/realms/... reaches Keycloak as /auth/realms/... which is correct
    # because KC_HTTP_RELATIVE_PATH=/auth. Adding a trailing slash here would
    # strip the /auth/ prefix and break all Keycloak endpoints.
    location /auth/ {
        proxy_pass         http://keycloak:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffer_size  64k;
        proxy_buffers      8 64k;
        proxy_busy_buffers_size 128k;
    }

    # fee-engine admin API
    location /admin/ {
        set $fee_engine http://fee-engine:8080;
        proxy_pass       $fee_engine/admin/;
        proxy_set_header Authorization    $http_authorization;
        proxy_set_header Host             $host;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # AI assistant API
    location /ai/ {
        set $ai_assistant http://ai-assistant:8081;
        proxy_pass       $ai_assistant/ai/;
        proxy_set_header Authorization    $http_authorization;
        proxy_set_header Host             $host;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # Admin UI SPA (catch-all — must be last)
    location / {
        proxy_pass http://admin-ui:80;
    }
}
