server {
    listen 80;

    # Keycloak — must preserve the /auth/ prefix end-to-end
    location /auth/ {
        proxy_pass         http://keycloak:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffer_size  64k;
        proxy_buffers      8 64k;
        proxy_busy_buffers_size 128k;
    }

    # fee-engine admin API
    location /admin/ {
        proxy_pass       http://fee-engine:8080/admin/;
        proxy_set_header Authorization $http_authorization;
    }

    # AI assistant API
    location /ai/ {
        proxy_pass       http://ai-assistant:8081/ai/;
        proxy_set_header Authorization $http_authorization;
    }

    # Admin UI SPA (catch-all — must be last)
    location / {
        proxy_pass http://admin-ui:80;
    }
}
